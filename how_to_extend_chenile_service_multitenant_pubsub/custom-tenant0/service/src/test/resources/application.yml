logging:
  level:
    ROOT: INFO
    org.hibernate.SQL: INFO
    org.chenile.*: DEBUG

chenile:
  http:
    extension-subtypes:
      - name: tenant0_ext
        className: com.mycompany.myorg.vehicle.model.VehicleExtensionTenant0
  base:
    url:

spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ''
    hikari:
      poolName: Hikari
      auto-commit: false
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: never
  jackson:
    serialization:
      indent-output: true

pubsub:
  topic:
    separator: _

server:
  error:
    whitelabel:
      enabled: false
