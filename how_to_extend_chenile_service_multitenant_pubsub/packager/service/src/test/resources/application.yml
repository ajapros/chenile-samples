logging:
  level:
    ROOT: INFO
    org.hibernate.SQL: INFO
    org.chenile.*: DEBUG

chenile:
  http:
    extension-subtypes:
      - name: tenant0_ext
        className: com.mycompany.myorg.vehicle.model.VehicleExtensionTenant0
      - name: tenant1_ext
        className: com.mycompany.myorg.vehicle.model.VehicleExtensionTenant1
  base:
    url:
  multids:
    defaultTenantId: tenant1
    datasources:
      tenant1:
        jdbcUrl: jdbc:h2:mem:packager-tenant1;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=RUNSCRIPT FROM 'classpath:db/packager-schema.sql'
        username: sa
        password: ''
        maximumPoolSize: '5'
      tenant0:
        jdbcUrl: jdbc:h2:mem:packager-tenant0;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=RUNSCRIPT FROM 'classpath:db/packager-schema.sql'
        username: sa
        password: ''
        maximumPoolSize: '5'

spring:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: never

pubsub:
  topic:
    separator: _
