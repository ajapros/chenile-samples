apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-app-scaler
  namespace: keda-mvp
spec:
  scaleTargetRef:
    name: worker-app
  minReplicaCount: 1
  maxReplicaCount: 10
  pollingInterval: 10
  cooldownPeriod: 30
  triggers:
    - type: rabbitmq
      metadata:
        queueName: chenile
        host: amqp://guest:guest@rabbitmq-service.keda-mvp.svc.cluster.local:5672/
        protocol: amqp
        mode: QueueLength
        value: "1"
        activationValue: "0"