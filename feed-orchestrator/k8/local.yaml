apiVersion: v1
kind: Namespace
metadata:
  name: keda-mvp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: keda-mvp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - containerPort: 5672  # AMQP
            - containerPort: 15672 # Management UI
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: guest
            - name: RABBITMQ_DEFAULT_PASS
              value: guest
            - name: RABBITMQ_LOOPBACK_USERS
              value: ""  # 👈 disables loopback-only restriction on 'guest'
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: keda-mvp
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-app
  namespace: keda-mvp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: feed-worker:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9000
          resources:
            requests:
              cpu: "250m"
              memory: "250Mi"
            limits:
              cpu: "500m"
              memory: "500Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: worker-service
  namespace: keda-mvp
spec:
  selector:
    app: worker
  ports:
    - protocol: TCP
      port: 9000
      targetPort: 9000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: master-app
  namespace: keda-mvp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: master
  template:
    metadata:
      labels:
        app: master
    spec:
      containers:
        - name: master
          image: feed-master:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
    name: master-service
    namespace: keda-mvp
spec:
  selector:
    app: master
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: keda-mvp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17
          env:
            - name: POSTGRES_USER
              value: gaurav
            - name: POSTGRES_PASSWORD
              value: '1234'
            - name: POSTGRES_DB
              value: feed
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: keda-mvp
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---

